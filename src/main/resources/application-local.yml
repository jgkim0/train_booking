spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/train_booking?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: tuser
    password: t123456
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
